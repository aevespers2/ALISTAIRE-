site_name: Alistaire Charter
site_description: Evidence-bounded product, architecture, portable security, governance, orchestration, and repository-consolidation documentation for the A.L.I.S.T.A.I.R.E. QSO system.
repo_name: aevespers2/ALISTAIRE-
repo_url: https://github.com/aevespers2/ALISTAIRE-
edit_uri: edit/main/docs/
strict: true
extra:
  runtime_fabric_partition_status: BLOCKED_ROLE_COLLISION
  runtime_fabric_inventory_status: OBSERVED_CANDIDATE_INVENTORY_RECORDED_BLOCKED_UNACCEPTED_BINDINGS
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
nav:
  - Home: index.md
  - Architecture:
      - System composition: architecture.md
      - Orchestration mode: orchestration-mode.md
      - Portfolio contract standard: portfolio-contract-standard.md
      - Portfolio contract and authority matrix: portfolio-contract-authority-matrix.md
      - D2A common-contract ownership graph: d2a-common-contract-ownership-graph.md
      - Machine-readable D2A graph: d2a-common-contract-ownership-graph-v1.json
      - Runtime/Fabric namespace partition: runtime-fabric-namespace-partition.md
      - Runtime/Fabric producer and consumer inventory: runtime-fabric-producer-consumer-inventory.md
      - Machine-readable runtime/Fabric inventory: runtime-fabric-producer-consumer-inventory-v1.json
      - Machine-readable runtime/Fabric partition: runtime-fabric-namespace-partition-v1.json
      - D3 canonical bytes and identity packet: d3-canonical-bytes-identity-decision-packet.md
      - Machine-readable D3 packet: d3-canonical-bytes-identity-decision-packet-v1.json
      - Decision source-generation rebind: decision-source-generation-rebind.md
      - Machine-readable source-generation rebind: decision-source-generation-rebind-v1.json
      - Portable security foundation: portable-security-foundation.md
      - Portfolio integration roadmap: portfolio-integration-roadmap.md
  - Governance:
      - Consolidated charter: governance-charter.md
      - Constitutional sovereignty and system participation: constitutional-sovereignty-and-system-participation.md
      - Constitutional appointment lifecycle conformance: constitutional-appointment-lifecycle-conformance.md
      - D2 neutral contract steward decision packet: d2-neutral-contract-steward-decision-packet.md
      - Machine-readable D2 packet: d2-neutral-contract-steward-decision-packet-v1.json
  - Repository consolidation:
      - Decision and options: repository-consolidation.md
      - D1 canonical identity decision packet: d1-canonical-identity-decision-packet.md
      - Machine-readable D1 packet: d1-canonical-identity-decision-packet-v1.json
      - Provenance and migration guide: repository-provenance-and-migration.md
      - Machine-readable provenance manifest: repository-provenance-manifest-v1.json
  - Security and governance: security-and-governance.md
  - Developer onboarding: development.md
  - Diagrams: diagrams.md
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
