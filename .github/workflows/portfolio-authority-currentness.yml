name: Portfolio Authority Currentness Review

on:
  pull_request:
    paths:
      - "docs/portfolio-authority-currentness-review.md"
      - "docs/portfolio-authority-currentness-v1.json"
      - "scripts/check_portfolio_authority_currentness.py"
      - "tests/test_check_portfolio_authority_currentness.py"
      - "taskchain.md"
      - "punchlist.md"
      - "release.md"
      - "changelog.md"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/portfolio-authority-currentness.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: portfolio-authority-currentness-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  validate-currentness:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
      PYTHONDONTWRITEBYTECODE: "1"
      EVIDENCE_DIR: ${{ runner.temp }}/portfolio-authority-currentness-evidence

    steps:
      - name: Initialize failure-path evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$EVIDENCE_DIR"
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'expected_head=%s\n' "$EXPECTED_HEAD"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
          } > "$EVIDENCE_DIR/source-intent.txt"

      - name: Check out exact submitted source
        id: checkout
        continue-on-error: true
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.EXPECTED_HEAD }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Assert immutable clean source
        id: source
        if: always() && steps.checkout.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          {
            test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
            test -z "$(git status --porcelain)"
            required=(
              docs/portfolio-authority-currentness-review.md
              docs/portfolio-authority-currentness-v1.json
              scripts/check_portfolio_authority_currentness.py
              tests/test_check_portfolio_authority_currentness.py
              taskchain.md punchlist.md release.md changelog.md
              mkdocs.yml requirements-docs.txt
              .github/workflows/portfolio-authority-currentness.yml
            )
            for path in "${required[@]}"; do test -f "$path"; done
            printf 'actual_head=%s\n' "$(git rev-parse HEAD)"
            git status --porcelain
          } > "$EVIDENCE_DIR/source-validation.txt" 2>&1
          status=$?
          cat "$EVIDENCE_DIR/source-validation.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Set up Python
        id: python
        if: always() && steps.checkout.outcome == 'success'
        continue-on-error: true
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Validate currentness packet
        id: packet
        if: always() && steps.source.outputs.status == '0' && steps.python.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python scripts/check_portfolio_authority_currentness.py \
            --submitted-sha "$EXPECTED_HEAD" \
            > "$EVIDENCE_DIR/currentness-report.json" 2> "$EVIDENCE_DIR/currentness-errors.txt"
          status=$?
          cat "$EVIDENCE_DIR/currentness-report.json" || true
          cat "$EVIDENCE_DIR/currentness-errors.txt" >&2 || true
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run hostile currentness regressions
        id: tests
        if: always() && steps.source.outputs.status == '0' && steps.python.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python -m unittest tests.test_check_portfolio_authority_currentness -v \
            > "$EVIDENCE_DIR/currentness-tests.txt" 2>&1
          status=$?
          cat "$EVIDENCE_DIR/currentness-tests.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Validate complete documentation surface
        id: docs
        if: always() && steps.source.outputs.status == '0' && steps.python.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python scripts/validate_documentation.py \
            > "$EVIDENCE_DIR/documentation-validation.txt" 2>&1
          status=$?
          cat "$EVIDENCE_DIR/documentation-validation.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Install pinned documentation dependencies
        id: dependencies
        if: always() && steps.source.outputs.status == '0' && steps.python.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python -m pip install --requirement requirements-docs.txt \
            > "$EVIDENCE_DIR/dependency-install.txt" 2>&1
          status=$?
          cat "$EVIDENCE_DIR/dependency-install.txt"
          python -m pip freeze > "$EVIDENCE_DIR/resolved-environment.txt" 2>&1 || true
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build documentation strictly
        id: build
        if: always() && steps.dependencies.outputs.status == '0'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          mkdocs build --strict --site-dir "$RUNNER_TEMP/portfolio-authority-site" \
            > "$EVIDENCE_DIR/mkdocs-build.txt" 2>&1
          status=$?
          cat "$EVIDENCE_DIR/mkdocs-build.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record deterministic inputs and clean-tree assurance
        id: integrity
        if: always() && steps.checkout.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          sha256sum \
            docs/portfolio-authority-currentness-review.md \
            docs/portfolio-authority-currentness-v1.json \
            scripts/check_portfolio_authority_currentness.py \
            tests/test_check_portfolio_authority_currentness.py \
            taskchain.md punchlist.md release.md changelog.md \
            mkdocs.yml requirements-docs.txt \
            .github/workflows/portfolio-authority-currentness.yml \
            > "$EVIDENCE_DIR/input-sha256.txt" 2> "$EVIDENCE_DIR/integrity-errors.txt"
          status=$?
          if [ -d "$RUNNER_TEMP/portfolio-authority-site" ]; then
            find "$RUNNER_TEMP/portfolio-authority-site" -type f -print0 | sort -z | xargs -0 sha256sum \
              > "$EVIDENCE_DIR/site-sha256.txt" 2>> "$EVIDENCE_DIR/integrity-errors.txt" || status=$?
          fi
          git diff --exit-code >> "$EVIDENCE_DIR/clean-tree.txt" 2>&1 || status=$?
          git diff --cached --exit-code >> "$EVIDENCE_DIR/clean-tree.txt" 2>&1 || status=$?
          test -z "$(git status --porcelain)" >> "$EVIDENCE_DIR/clean-tree.txt" 2>&1 || status=$?
          cat "$EVIDENCE_DIR/integrity-errors.txt" >&2 || true
          cat "$EVIDENCE_DIR/clean-tree.txt" || true
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record outcome matrix
        if: always()
        shell: bash
        env:
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          SOURCE_STATUS: ${{ steps.source.outputs.status }}
          PYTHON_OUTCOME: ${{ steps.python.outcome }}
          PACKET_STATUS: ${{ steps.packet.outputs.status }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
          DOCS_STATUS: ${{ steps.docs.outputs.status }}
          DEPENDENCY_STATUS: ${{ steps.dependencies.outputs.status }}
          BUILD_STATUS: ${{ steps.build.outputs.status }}
          INTEGRITY_STATUS: ${{ steps.integrity.outputs.status }}
        run: |
          {
            printf 'checkout=%s\n' "${CHECKOUT_OUTCOME:-missing}"
            printf 'source=%s\n' "${SOURCE_STATUS:-missing}"
            printf 'python=%s\n' "${PYTHON_OUTCOME:-missing}"
            printf 'packet=%s\n' "${PACKET_STATUS:-missing}"
            printf 'tests=%s\n' "${TEST_STATUS:-missing}"
            printf 'docs=%s\n' "${DOCS_STATUS:-missing}"
            printf 'dependencies=%s\n' "${DEPENDENCY_STATUS:-missing}"
            printf 'build=%s\n' "${BUILD_STATUS:-missing}"
            printf 'integrity=%s\n' "${INTEGRITY_STATUS:-missing}"
          } | tee "$EVIDENCE_DIR/outcomes.txt"

      - name: Upload retained currentness evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: portfolio-authority-currentness-${{ env.EXPECTED_HEAD }}
          path: ${{ env.EVIDENCE_DIR }}
          if-no-files-found: error
          retention-days: 30

      - name: Fail closed after evidence retention
        if: always()
        shell: bash
        env:
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          SOURCE_STATUS: ${{ steps.source.outputs.status }}
          PYTHON_OUTCOME: ${{ steps.python.outcome }}
          PACKET_STATUS: ${{ steps.packet.outputs.status }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
          DOCS_STATUS: ${{ steps.docs.outputs.status }}
          DEPENDENCY_STATUS: ${{ steps.dependencies.outputs.status }}
          BUILD_STATUS: ${{ steps.build.outputs.status }}
          INTEGRITY_STATUS: ${{ steps.integrity.outputs.status }}
        run: |
          set -euo pipefail
          test "$CHECKOUT_OUTCOME" = "success"
          test "$SOURCE_STATUS" = "0"
          test "$PYTHON_OUTCOME" = "success"
          test "$PACKET_STATUS" = "0"
          test "$TEST_STATUS" = "0"
          test "$DOCS_STATUS" = "0"
          test "$DEPENDENCY_STATUS" = "0"
          test "$BUILD_STATUS" = "0"
          test "$INTEGRITY_STATUS" = "0"
