name: Name and Capability Roadmap

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/index.md"
      - "docs/name-and-capability-roadmap.md"
      - "docs/name-and-capability-roadmap-v1.json"
      - "scripts/check_name_and_capability_roadmap.py"
      - "tests/test_check_name_and_capability_roadmap.py"
      - "mkdocs.yml"
      - "changelog.md"
      - "requirements-docs.txt"
      - ".github/workflows/name-capability-roadmap.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: name-capability-roadmap-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.EXPECTED_HEAD }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Assert exact clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          test -z "$(git status --porcelain)"
          evidence="$RUNNER_TEMP/name-capability-roadmap-evidence"
          mkdir -p "$evidence"
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$EXPECTED_HEAD"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
          } | tee "$evidence/source-identity.txt"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Validate roadmap profile
        id: roadmap
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/name-capability-roadmap-evidence"
          python scripts/check_name_and_capability_roadmap.py \
            > "$evidence/roadmap-validation.json" \
            2> "$evidence/roadmap-validation-errors.txt"
          status=$?
          cat "$evidence/roadmap-validation.json" || true
          cat "$evidence/roadmap-validation-errors.txt" >&2 || true
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run hostile roadmap regressions
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/name-capability-roadmap-evidence"
          python -m unittest tests.test_check_name_and_capability_roadmap -v \
            > "$evidence/roadmap-regression-tests.txt" 2>&1
          status=$?
          cat "$evidence/roadmap-regression-tests.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Validate complete documentation surface
        id: docs
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/name-capability-roadmap-evidence"
          python scripts/validate_documentation.py \
            > "$evidence/documentation-validation.txt" 2>&1
          status=$?
          cat "$evidence/documentation-validation.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Install pinned documentation dependencies
        run: python -m pip install --requirement requirements-docs.txt

      - name: Build documentation strictly
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/name-capability-roadmap-evidence"
          mkdocs build --strict --site-dir "$RUNNER_TEMP/name-capability-roadmap-site" \
            > "$evidence/mkdocs-build.txt" 2>&1
          status=$?
          cat "$evidence/mkdocs-build.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record deterministic evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/name-capability-roadmap-evidence"
          sha256sum \
            README.md \
            docs/index.md \
            docs/name-and-capability-roadmap.md \
            docs/name-and-capability-roadmap-v1.json \
            scripts/check_name_and_capability_roadmap.py \
            tests/test_check_name_and_capability_roadmap.py \
            mkdocs.yml \
            changelog.md \
            requirements-docs.txt \
            .github/workflows/name-capability-roadmap.yml \
            > "$evidence/input-sha256.txt"
          if [ -d "$RUNNER_TEMP/name-capability-roadmap-site" ]; then
            find "$RUNNER_TEMP/name-capability-roadmap-site" -type f -print0 \
              | sort -z \
              | xargs -0 sha256sum \
              > "$evidence/site-sha256.txt"
          fi
          git diff --exit-code
          git diff --cached --exit-code
          test -z "$(git status --porcelain)"

      - name: Upload retained roadmap evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: alistaire-name-capability-roadmap-${{ env.EXPECTED_HEAD }}
          path: ${{ runner.temp }}/name-capability-roadmap-evidence
          if-no-files-found: error
          retention-days: 30

      - name: Fail closed on unsuccessful validation
        if: always()
        shell: bash
        env:
          ROADMAP_STATUS: ${{ steps.roadmap.outputs.status }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
          DOCS_STATUS: ${{ steps.docs.outputs.status }}
          BUILD_STATUS: ${{ steps.build.outputs.status }}
        run: |
          set -euo pipefail
          test "$ROADMAP_STATUS" = "0"
          test "$TEST_STATUS" = "0"
          test "$DOCS_STATUS" = "0"
          test "$BUILD_STATUS" = "0"
