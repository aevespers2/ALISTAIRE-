name: Portfolio Authority Source Reconciliation

on:
  pull_request:
    paths:
      - "docs/portfolio-authority-source-reconciliation.md"
      - "docs/portfolio-authority-source-reconciliation-v1.json"
      - "docs/portfolio-contract-authority-matrix.md"
      - "taskchain.md"
      - "punchlist.md"
      - "release.md"
      - "changelog.md"
      - "mkdocs.yml"
      - "scripts/check_portfolio_authority_source_reconciliation.py"
      - "tests/test_check_portfolio_authority_source_reconciliation.py"
      - "requirements-docs.txt"
      - ".github/workflows/portfolio-authority-source-reconciliation.yml"
  push:
    branches: [main]
    paths:
      - "docs/portfolio-authority-source-reconciliation.md"
      - "docs/portfolio-authority-source-reconciliation-v1.json"
      - "docs/portfolio-contract-authority-matrix.md"
      - "taskchain.md"
      - "punchlist.md"
      - "release.md"
      - "changelog.md"
      - "mkdocs.yml"
      - "scripts/check_portfolio_authority_source_reconciliation.py"
      - "tests/test_check_portfolio_authority_source_reconciliation.py"
      - "requirements-docs.txt"
      - ".github/workflows/portfolio-authority-source-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: portfolio-authority-source-reconciliation-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPECTED_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Initialize evidence directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/portfolio-authority-source-reconciliation
          printf 'expected_head=%s\n' "$EXPECTED_HEAD" > reports/portfolio-authority-source-reconciliation/source-intent.txt

      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.EXPECTED_HEAD }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Assert exact clean source identity
        id: source
        continue-on-error: true
        shell: bash
        run: |
          set +e
          actual="$(git rev-parse HEAD 2>/dev/null)"
          status=0
          if [ "$actual" != "$EXPECTED_HEAD" ]; then
            printf 'expected=%s\nactual=%s\n' "$EXPECTED_HEAD" "$actual" > reports/portfolio-authority-source-reconciliation/source-error.txt
            status=1
          fi
          if [ -n "$(git status --porcelain 2>/dev/null)" ]; then
            git status --porcelain >> reports/portfolio-authority-source-reconciliation/source-error.txt
            status=1
          fi
          printf '%s\n' "$actual" > reports/portfolio-authority-source-reconciliation/exact-head.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Validate reconciliation packet
        id: packet
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python scripts/check_portfolio_authority_source_reconciliation.py --submitted-sha "$EXPECTED_HEAD" > reports/portfolio-authority-source-reconciliation/packet-validation.json 2>&1
          status=$?
          cat reports/portfolio-authority-source-reconciliation/packet-validation.json
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Run hostile reconciliation regressions
        id: regressions
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python -m unittest tests.test_check_portfolio_authority_source_reconciliation -v > reports/portfolio-authority-source-reconciliation/regressions.txt 2>&1
          status=$?
          cat reports/portfolio-authority-source-reconciliation/regressions.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Run complete documentation validator
        id: documentation
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python scripts/validate_documentation.py > reports/portfolio-authority-source-reconciliation/documentation-validation.txt 2>&1
          status=$?
          cat reports/portfolio-authority-source-reconciliation/documentation-validation.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Install pinned documentation toolchain
        id: dependencies
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python -m pip install --requirement requirements-docs.txt > reports/portfolio-authority-source-reconciliation/dependency-install.txt 2>&1
          status=$?
          python -m pip freeze | sort > reports/portfolio-authority-source-reconciliation/dependencies.txt 2>&1
          cat reports/portfolio-authority-source-reconciliation/dependency-install.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Build Pages candidate strictly
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set +e
          mkdocs build --strict --site-dir site > reports/portfolio-authority-source-reconciliation/mkdocs-build.txt 2>&1
          status=$?
          cat reports/portfolio-authority-source-reconciliation/mkdocs-build.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Generate deterministic evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          root=reports/portfolio-authority-source-reconciliation
          python --version > "$root/python-version.txt" 2>&1 || true
          {
            printf 'source_status=%s\n' "${{ steps.source.outputs.status || 'not-run' }}"
            printf 'packet_status=%s\n' "${{ steps.packet.outputs.status || 'not-run' }}"
            printf 'regressions_status=%s\n' "${{ steps.regressions.outputs.status || 'not-run' }}"
            printf 'documentation_status=%s\n' "${{ steps.documentation.outputs.status || 'not-run' }}"
            printf 'dependencies_status=%s\n' "${{ steps.dependencies.outputs.status || 'not-run' }}"
            printf 'build_status=%s\n' "${{ steps.build.outputs.status || 'not-run' }}"
            printf 'reconciliation_status=%s\n' 'PORTFOLIO_AUTHORITY_SOURCES_RECONCILED_CONFLICTS_DISSENT_AND_VACANCIES_RECORDED_BINDINGS_UNACCEPTED'
            printf 'authority_effect=NONE\npublication_effect=NONE\nruntime_effect=NONE\n'
          } > "$root/run-summary.txt"
          if [ -d site ]; then
            find site -type f -print0 | sort -z | xargs -0 sha256sum > "$root/site-SHA256SUMS"
          else
            : > "$root/site-SHA256SUMS"
          fi
          sha256sum docs/portfolio-authority-source-reconciliation.md docs/portfolio-authority-source-reconciliation-v1.json docs/portfolio-contract-authority-matrix.md taskchain.md punchlist.md release.md changelog.md mkdocs.yml requirements-docs.txt scripts/check_portfolio_authority_source_reconciliation.py tests/test_check_portfolio_authority_source_reconciliation.py .github/workflows/portfolio-authority-source-reconciliation.yml > "$root/source-SHA256SUMS"
          find "$root" -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > "$root/SHA256SUMS"

      - name: Upload reconciliation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: portfolio-authority-source-reconciliation-${{ env.EXPECTED_HEAD }}
          path: |
            reports/portfolio-authority-source-reconciliation
            site
          if-no-files-found: error
          retention-days: 30

      - name: Fail closed after evidence retention
        if: always()
        shell: bash
        run: |
          test "${{ steps.source.outputs.status }}" = "0"
          test "${{ steps.packet.outputs.status }}" = "0"
          test "${{ steps.regressions.outputs.status }}" = "0"
          test "${{ steps.documentation.outputs.status }}" = "0"
          test "${{ steps.dependencies.outputs.status }}" = "0"
          test "${{ steps.build.outputs.status }}" = "0"
