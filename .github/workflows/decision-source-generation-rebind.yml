name: Decision Source Generation Rebind

on:
  pull_request:
    paths:
      - "README.md"
      - "taskchain.md"
      - "docs/decision-source-generation-rebind.md"
      - "docs/decision-source-generation-rebind-v1.json"
      - "docs/d2a-common-contract-ownership-graph-v1.json"
      - "docs/d3-canonical-bytes-identity-decision-packet-v1.json"
      - "scripts/check_decision_source_generation_rebind.py"
      - "tests/test_check_decision_source_generation_rebind.py"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/decision-source-generation-rebind.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: decision-source-generation-rebind-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-source-generation-rebind:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out exact submitted source with first-parent ancestry
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.EXPECTED_HEAD }}
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Record and validate exact source ancestry
        id: ancestry
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/decision-source-generation-rebind-evidence"
          mkdir -p "$evidence"
          status=0

          actual_head="$(git rev-parse HEAD 2>> "$evidence/ancestry-errors.txt")"
          if [ "$actual_head" != "$EXPECTED_HEAD" ]; then
            printf 'expected head %s but checked out %s\n' "$EXPECTED_HEAD" "$actual_head" \
              >> "$evidence/ancestry-errors.txt"
            status=1
          fi
          if [ -n "$(git status --porcelain)" ]; then
            printf 'working tree is not clean\n' >> "$evidence/ancestry-errors.txt"
            status=1
          fi

          rebind_parent="$(
            python - <<'PY' 2>> "$evidence/ancestry-errors.txt"
          import json
          from pathlib import Path
          data = json.loads(
              Path("docs/decision-source-generation-rebind-v1.json").read_text(encoding="utf-8")
          )
          print(data["rebind_parent"])
          PY
          )"
          if [ $? -ne 0 ] || [ -z "$rebind_parent" ]; then
            printf 'could not read rebind_parent\n' >> "$evidence/ancestry-errors.txt"
            status=1
          fi
          if [ "$rebind_parent" = "$EXPECTED_HEAD" ]; then
            printf 'submitted head equals rebind parent\n' >> "$evidence/ancestry-errors.txt"
            status=1
          fi

          git rev-list --first-parent "$EXPECTED_HEAD" \
            > "$evidence/first-parent-ancestry.txt" \
            2>> "$evidence/ancestry-errors.txt"
          if [ $? -ne 0 ] || ! grep -Fxq "$rebind_parent" "$evidence/first-parent-ancestry.txt"; then
            printf 'rebind parent is absent from submitted-head first-parent ancestry\n' \
              >> "$evidence/ancestry-errors.txt"
            status=1
          fi

          immediate_parent="$(git rev-parse HEAD^1 2>> "$evidence/ancestry-errors.txt")"
          if [ $? -ne 0 ] || [ -z "$immediate_parent" ]; then
            printf 'could not resolve immediate parent\n' >> "$evidence/ancestry-errors.txt"
            status=1
          fi

          required=(
            docs/decision-source-generation-rebind.md
            docs/decision-source-generation-rebind-v1.json
            docs/d2a-common-contract-ownership-graph-v1.json
            docs/d3-canonical-bytes-identity-decision-packet-v1.json
            scripts/check_decision_source_generation_rebind.py
            tests/test_check_decision_source_generation_rebind.py
          )
          for path in "${required[@]}"; do
            if [ ! -f "$path" ]; then
              printf 'required path missing: %s\n' "$path" >> "$evidence/ancestry-errors.txt"
              status=1
            fi
          done

          echo "ANCESTRY_ANCHOR=$rebind_parent" >> "$GITHUB_ENV"
          echo "IMMEDIATE_PARENT=$immediate_parent" >> "$GITHUB_ENV"
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'submitted_sha=%s\n' "$EXPECTED_HEAD"
            printf 'immediate_parent=%s\n' "$immediate_parent"
            printf 'ancestry_anchor=%s\n' "$rebind_parent"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
            printf 'ancestry_status=%s\n' "$status"
          } | tee "$evidence/source-identity.txt"
          cat "$evidence/ancestry-errors.txt" >&2 || true
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Validate source-generation rebind
        id: rebind
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/decision-source-generation-rebind-evidence"
          python scripts/check_decision_source_generation_rebind.py \
            --submitted-sha "$EXPECTED_HEAD" \
            --ancestry-anchor "$ANCESTRY_ANCHOR" \
            > "$evidence/rebind-report.json" \
            2> "$evidence/rebind-errors.txt"
          status=$?
          cat "$evidence/rebind-report.json" || true
          cat "$evidence/rebind-errors.txt" >&2 || true
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run hostile regressions
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/decision-source-generation-rebind-evidence"
          python -m unittest tests.test_check_decision_source_generation_rebind -v \
            > "$evidence/rebind-tests.txt" 2>&1
          status=$?
          cat "$evidence/rebind-tests.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Validate complete documentation surface
        id: docs
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/decision-source-generation-rebind-evidence"
          python scripts/validate_documentation.py \
            > "$evidence/documentation-validation.txt" 2>&1
          status=$?
          cat "$evidence/documentation-validation.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Install pinned documentation dependencies
        run: python -m pip install --requirement requirements-docs.txt

      - name: Build documentation strictly
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/decision-source-generation-rebind-evidence"
          mkdocs build --strict --site-dir "$RUNNER_TEMP/rebind-site" \
            > "$evidence/mkdocs-build.txt" 2>&1
          status=$?
          cat "$evidence/mkdocs-build.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record deterministic inputs and clean-tree assurance
        id: integrity
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/decision-source-generation-rebind-evidence"
          sha256sum \
            README.md taskchain.md mkdocs.yml requirements-docs.txt \
            docs/decision-source-generation-rebind.md \
            docs/decision-source-generation-rebind-v1.json \
            docs/d2a-common-contract-ownership-graph-v1.json \
            docs/d3-canonical-bytes-identity-decision-packet-v1.json \
            scripts/check_decision_source_generation_rebind.py \
            tests/test_check_decision_source_generation_rebind.py \
            .github/workflows/decision-source-generation-rebind.yml \
            > "$evidence/input-sha256.txt" 2> "$evidence/integrity-errors.txt"
          status=$?
          if [ -d "$RUNNER_TEMP/rebind-site" ]; then
            find "$RUNNER_TEMP/rebind-site" -type f -print0 | sort -z | xargs -0 sha256sum \
              > "$evidence/site-sha256.txt" 2>> "$evidence/integrity-errors.txt"
            if [ $? -ne 0 ]; then status=1; fi
          fi
          git diff --exit-code >> "$evidence/integrity-errors.txt" 2>&1
          if [ $? -ne 0 ]; then status=1; fi
          git diff --cached --exit-code >> "$evidence/integrity-errors.txt" 2>&1
          if [ $? -ne 0 ]; then status=1; fi
          if [ -n "$(git status --porcelain)" ]; then status=1; fi
          cat "$evidence/integrity-errors.txt" >&2 || true
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload retained rebind evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: alistaire-source-generation-rebind-${{ env.EXPECTED_HEAD }}
          path: ${{ runner.temp }}/decision-source-generation-rebind-evidence
          if-no-files-found: error
          retention-days: 30

      - name: Fail closed on unsuccessful validation
        if: always()
        shell: bash
        env:
          ANCESTRY_STATUS: ${{ steps.ancestry.outputs.status }}
          REBIND_STATUS: ${{ steps.rebind.outputs.status }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
          DOCS_STATUS: ${{ steps.docs.outputs.status }}
          BUILD_STATUS: ${{ steps.build.outputs.status }}
          INTEGRITY_STATUS: ${{ steps.integrity.outputs.status }}
        run: |
          set -euo pipefail
          test "$ANCESTRY_STATUS" = "0"
          test "$REBIND_STATUS" = "0"
          test "$TEST_STATUS" = "0"
          test "$DOCS_STATUS" = "0"
          test "$BUILD_STATUS" = "0"
          test "$INTEGRITY_STATUS" = "0"
