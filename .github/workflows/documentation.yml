name: Documentation

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "taskchain.md"
      - "release.md"
      - "punchlist.md"
      - "changelog.md"
      - ".github/workflows/documentation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Assert exact source identity
        shell: bash
        run: |
          set -euo pipefail
          expected="${{ github.event.pull_request.head.sha || github.sha }}"
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$expected"
          printf 'verified_head=%s\n' "$actual"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install documentation dependencies
        run: python -m pip install --requirement requirements-docs.txt

      - name: Build documentation strictly
        run: mkdocs build --strict --site-dir site

      - name: Record documentation checksums
        shell: bash
        run: |
          set -euo pipefail
          find site -type f -print0 | sort -z | xargs -0 sha256sum > documentation-sha256.txt
          sha256sum mkdocs.yml requirements-docs.txt >> documentation-sha256.txt
          cat documentation-sha256.txt

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: alistaire-charter-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            site/
            documentation-sha256.txt
          if-no-files-found: error
          retention-days: 30
