name: Documentation

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "fixtures/constitutional-appointment-lifecycle-v1.json"
      - "fixtures/constitutional-lifecycle-transaction-journal-v1.json"
      - "fixtures/constitutional-lifecycle-snapshot-compaction-v1.json"
      - "fixtures/constitutional-lifecycle-backup-restore-v1.json"
      - "fixtures/constitutional-lifecycle-restore-staging-multicopy-v1.json"
      - "scripts/validate_documentation.py"
      - "scripts/validate_rendered_site.py"
      - "scripts/check_portfolio_authority_currentness.py"
      - "scripts/check_constitutional_appointment_lifecycle.py"
      - "scripts/check_constitutional_lifecycle_transaction_journal.py"
      - "scripts/check_constitutional_lifecycle_snapshot_compaction.py"
      - "scripts/check_constitutional_lifecycle_backup_restore.py"
      - "scripts/check_constitutional_lifecycle_restore_staging_multicopy.py"
      - "tests/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "taskchain.md"
      - "release.md"
      - "punchlist.md"
      - "changelog.md"
      - ".github/workflows/documentation.yml"
      - ".github/workflows/portfolio-authority-currentness.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - "fixtures/constitutional-appointment-lifecycle-v1.json"
      - "fixtures/constitutional-lifecycle-transaction-journal-v1.json"
      - "fixtures/constitutional-lifecycle-snapshot-compaction-v1.json"
      - "fixtures/constitutional-lifecycle-backup-restore-v1.json"
      - "fixtures/constitutional-lifecycle-restore-staging-multicopy-v1.json"
      - "scripts/validate_documentation.py"
      - "scripts/validate_rendered_site.py"
      - "scripts/check_portfolio_authority_currentness.py"
      - "scripts/check_constitutional_appointment_lifecycle.py"
      - "scripts/check_constitutional_lifecycle_transaction_journal.py"
      - "scripts/check_constitutional_lifecycle_snapshot_compaction.py"
      - "scripts/check_constitutional_lifecycle_backup_restore.py"
      - "scripts/check_constitutional_lifecycle_restore_staging_multicopy.py"
      - "tests/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "taskchain.md"
      - "release.md"
      - "punchlist.md"
      - "changelog.md"
      - ".github/workflows/documentation.yml"
      - ".github/workflows/portfolio-authority-currentness.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: documentation-${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      EXPECTED_LIFECYCLE_JOURNAL_SHA256: 514ff45d55ae889a534a005465f71c1c74997585e10a53de89094d7f07583dd9
      EXPECTED_SNAPSHOT_COMPACTION_SHA256: 6b1e0177e73145572286d66e662bf498755cdbf685c05534f6e99a0d903bf140
      EXPECTED_BACKUP_RESTORE_SHA256: 1da592ac85a1880e7b3701860e5c360260622bf4ca36f8eb6c14693a7201a83b
      EXPECTED_RESTORE_STAGING_MULTICOPY_SHA256: 812f1e5580caa687d30e96e9efed8214d47a131337f82577cfcaa1c27d1e46a2
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.EXPECTED_HEAD }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Assert exact clean source
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$EXPECTED_HEAD"
          test -z "$(git status --porcelain)"
          printf 'verified_head=%s\n' "$actual"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Validate charter documentation surface
        shell: bash
        run: |
          set -o pipefail
          mkdir -p reports/documentation
          python scripts/validate_documentation.py 2>&1 \
            | tee reports/documentation/documentation-validation.txt

      - name: Validate synthetic appointment lifecycle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/documentation
          python scripts/check_constitutional_appointment_lifecycle.py \
            2>&1 | tee reports/documentation/appointment-lifecycle-validation.json

      - name: Validate synthetic lifecycle transaction journal
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/documentation
          actual="$(sha256sum fixtures/constitutional-lifecycle-transaction-journal-v1.json | cut -d' ' -f1)"
          test "$actual" = "$EXPECTED_LIFECYCLE_JOURNAL_SHA256"
          python scripts/check_constitutional_lifecycle_transaction_journal.py \
            2>&1 | tee reports/documentation/lifecycle-transaction-journal-validation.json

      - name: Validate synthetic snapshot and compaction recovery
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/documentation
          actual="$(sha256sum fixtures/constitutional-lifecycle-snapshot-compaction-v1.json | cut -d' ' -f1)"
          test "$actual" = "$EXPECTED_SNAPSHOT_COMPACTION_SHA256"
          python scripts/check_constitutional_lifecycle_snapshot_compaction.py \
            --fixture fixtures/constitutional-lifecycle-snapshot-compaction-v1.json \
            --expected-sha256 "$EXPECTED_SNAPSHOT_COMPACTION_SHA256" \
            --report reports/documentation/snapshot-compaction-validation.json

      - name: Validate synthetic backup and restore recovery
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/documentation
          actual="$(sha256sum fixtures/constitutional-lifecycle-backup-restore-v1.json | cut -d' ' -f1)"
          test "$actual" = "$EXPECTED_BACKUP_RESTORE_SHA256"
          python scripts/check_constitutional_lifecycle_backup_restore.py \
            --fixture fixtures/constitutional-lifecycle-backup-restore-v1.json \
            --expected-sha256 "$EXPECTED_BACKUP_RESTORE_SHA256" \
            --report reports/documentation/backup-restore-validation.json

      - name: Validate synthetic restore staging and multi-copy reconciliation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/documentation
          actual="$(sha256sum fixtures/constitutional-lifecycle-restore-staging-multicopy-v1.json | cut -d' ' -f1)"
          test "$actual" = "$EXPECTED_RESTORE_STAGING_MULTICOPY_SHA256"
          python scripts/check_constitutional_lifecycle_restore_staging_multicopy.py \
            --fixture fixtures/constitutional-lifecycle-restore-staging-multicopy-v1.json \
            --expected-sha256 "$EXPECTED_RESTORE_STAGING_MULTICOPY_SHA256" \
            --report reports/documentation/restore-staging-multicopy-validation.json

      - name: Run documentation and lifecycle regression tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p reports/documentation
          python -m unittest discover -s tests -p "test_*.py" -v 2>&1 \
            | tee reports/documentation/regression-tests.txt

      - name: Install pinned documentation dependencies
        run: python -m pip install --requirement requirements-docs.txt

      - name: Build documentation strictly
        run: mkdocs build --strict --site-dir site

      - name: Validate rendered HTML offline
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/documentation
          python scripts/validate_rendered_site.py site \
            2>&1 | tee reports/documentation/rendered-site-validation.txt

      - name: Create deterministic evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/documentation
          cp fixtures/constitutional-lifecycle-snapshot-compaction-v1.json \
            reports/documentation/snapshot-compaction-fixture.json
          cp fixtures/constitutional-lifecycle-backup-restore-v1.json \
            reports/documentation/backup-restore-fixture.json
          cp fixtures/constitutional-lifecycle-restore-staging-multicopy-v1.json \
            reports/documentation/restore-staging-multicopy-fixture.json
          if [ -d site ]; then
            find site -type f -print0 | sort -z | xargs -0 sha256sum \
              > reports/documentation/SITE_SHA256SUMS
            tar --sort=name \
                --mtime='@0' \
                --owner=0 --group=0 --numeric-owner \
                --format=ustar \
                -cf - site \
              | gzip -n > reports/documentation/site.tar.gz
          fi
          git rev-parse HEAD > reports/documentation/exact-head.txt
          python --version > reports/documentation/python-version.txt 2>&1
          if command -v mkdocs >/dev/null 2>&1; then
            mkdocs --version > reports/documentation/mkdocs-version.txt 2>&1
          fi
          find docs -type f -print0 | sort -z | xargs -0 sha256sum \
            > reports/documentation/DOCS_SHA256SUMS
          sha256sum \
            README.md \
            taskchain.md \
            punchlist.md \
            release.md \
            changelog.md \
            mkdocs.yml \
            requirements-docs.txt \
            fixtures/constitutional-appointment-lifecycle-v1.json \
            fixtures/constitutional-lifecycle-transaction-journal-v1.json \
            fixtures/constitutional-lifecycle-snapshot-compaction-v1.json \
            fixtures/constitutional-lifecycle-backup-restore-v1.json \
            fixtures/constitutional-lifecycle-restore-staging-multicopy-v1.json \
            scripts/validate_documentation.py \
            scripts/validate_rendered_site.py \
            scripts/check_portfolio_authority_currentness.py \
            scripts/check_constitutional_appointment_lifecycle.py \
            scripts/check_constitutional_lifecycle_transaction_journal.py \
            scripts/check_constitutional_lifecycle_snapshot_compaction.py \
            scripts/check_constitutional_lifecycle_backup_restore.py \
            scripts/check_constitutional_lifecycle_restore_staging_multicopy.py \
            tests/test_check_portfolio_authority_currentness.py \
            tests/test_validate_rendered_site.py \
            tests/test_check_constitutional_appointment_lifecycle.py \
            tests/test_check_constitutional_lifecycle_transaction_journal.py \
            tests/test_check_constitutional_lifecycle_snapshot_compaction.py \
            tests/test_check_constitutional_lifecycle_backup_restore.py \
            tests/test_check_constitutional_lifecycle_restore_staging_multicopy.py \
            .github/workflows/documentation.yml \
            .github/workflows/portfolio-authority-currentness.yml \
            > reports/documentation/SHA256SUMS
          if [ -f reports/documentation/site.tar.gz ]; then
            sha256sum reports/documentation/site.tar.gz \
              >> reports/documentation/SHA256SUMS
          fi
          git diff --exit-code

      - name: Upload review evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: alistaire-charter-${{ env.EXPECTED_HEAD }}
          path: reports/documentation
          if-no-files-found: error
          retention-days: 30
