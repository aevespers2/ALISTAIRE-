name: Documentation

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "scripts/validate_documentation.py"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "taskchain.md"
      - "release.md"
      - "punchlist.md"
      - "changelog.md"
      - ".github/workflows/documentation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: documentation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Assert exact source identity
        shell: bash
        env:
          EXPECTED_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$EXPECTED_HEAD"
          printf 'verified_head=%s\n' "$actual"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Validate charter documentation surface
        run: python scripts/validate_documentation.py

      - name: Install pinned documentation dependencies
        run: python -m pip install --requirement requirements-docs.txt

      - name: Build documentation strictly
        run: mkdocs build --strict --site-dir site

      - name: Create deterministic evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/documentation
          if [ -d site ]; then
            tar --sort=name \
                --mtime='UTC 1970-01-01' \
                --owner=0 --group=0 --numeric-owner \
                -czf reports/documentation/site.tar.gz site
          fi
          git rev-parse HEAD > reports/documentation/exact-head.txt
          python --version > reports/documentation/python-version.txt 2>&1
          if command -v mkdocs >/dev/null 2>&1; then
            mkdocs --version > reports/documentation/mkdocs-version.txt 2>&1
          fi
          find docs -type f -print0 | sort -z | xargs -0 sha256sum > reports/documentation/DOCS_SHA256SUMS
          sha256sum \
            README.md \
            taskchain.md \
            punchlist.md \
            release.md \
            changelog.md \
            mkdocs.yml \
            requirements-docs.txt \
            scripts/validate_documentation.py \
            > reports/documentation/SHA256SUMS
          if [ -f reports/documentation/site.tar.gz ]; then
            sha256sum reports/documentation/site.tar.gz >> reports/documentation/SHA256SUMS
          fi

      - name: Upload review evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: alistaire-charter-${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          path: reports/documentation
          if-no-files-found: error
          retention-days: 30
