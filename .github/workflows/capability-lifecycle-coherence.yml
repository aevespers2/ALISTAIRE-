name: Capability Lifecycle Coherence

on:
  pull_request:
    paths:
      - "README.md"
      - "taskchain.md"
      - "punchlist.md"
      - "release.md"
      - "changelog.md"
      - "docs/index.md"
      - "docs/capability-roadmap.md"
      - "docs/capability-roadmap-v1.json"
      - "docs/portfolio-contributor-paths.md"
      - "docs/portfolio-contributor-paths-v1.json"
      - "docs/capability-lifecycle-coherence.md"
      - "docs/capability-lifecycle-coherence-v1.json"
      - "scripts/check_capability_lifecycle_coherence.py"
      - "tests/test_check_capability_lifecycle_coherence.py"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/capability-lifecycle-coherence.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: capability-lifecycle-coherence-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.EXPECTED_HEAD }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Assert exact clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          test -z "$(git status --porcelain)"
          evidence="$RUNNER_TEMP/capability-lifecycle-coherence-evidence"
          mkdir -p "$evidence"
          printf 'source_sha=%s\nworkflow_run=%s\n' "$EXPECTED_HEAD" "$GITHUB_RUN_ID" \
            | tee "$evidence/source-identity.txt"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Validate lifecycle coherence
        id: coherence
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/capability-lifecycle-coherence-evidence"
          python scripts/check_capability_lifecycle_coherence.py \
            > "$evidence/coherence-validation.json" \
            2> "$evidence/coherence-errors.txt"
          status=$?
          cat "$evidence/coherence-validation.json" || true
          cat "$evidence/coherence-errors.txt" >&2 || true
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run hostile coherence regressions
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/capability-lifecycle-coherence-evidence"
          python -m unittest tests.test_check_capability_lifecycle_coherence -v \
            > "$evidence/coherence-tests.txt" 2>&1
          status=$?
          cat "$evidence/coherence-tests.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Validate complete documentation surface
        id: docs
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/capability-lifecycle-coherence-evidence"
          python scripts/validate_documentation.py \
            > "$evidence/documentation-validation.txt" 2>&1
          status=$?
          cat "$evidence/documentation-validation.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Install pinned documentation dependencies
        run: python -m pip install --requirement requirements-docs.txt

      - name: Build documentation strictly
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/capability-lifecycle-coherence-evidence"
          mkdocs build --strict --site-dir "$RUNNER_TEMP/capability-lifecycle-coherence-site" \
            > "$evidence/mkdocs-build.txt" 2>&1
          status=$?
          cat "$evidence/mkdocs-build.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record deterministic evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/capability-lifecycle-coherence-evidence"
          sha256sum \
            README.md taskchain.md punchlist.md release.md changelog.md \
            docs/index.md docs/capability-roadmap.md docs/capability-roadmap-v1.json \
            docs/portfolio-contributor-paths.md docs/portfolio-contributor-paths-v1.json \
            docs/capability-lifecycle-coherence.md docs/capability-lifecycle-coherence-v1.json \
            scripts/check_capability_lifecycle_coherence.py \
            tests/test_check_capability_lifecycle_coherence.py \
            mkdocs.yml requirements-docs.txt \
            .github/workflows/capability-lifecycle-coherence.yml \
            > "$evidence/input-sha256.txt"
          if [ -d "$RUNNER_TEMP/capability-lifecycle-coherence-site" ]; then
            find "$RUNNER_TEMP/capability-lifecycle-coherence-site" -type f -print0 \
              | sort -z | xargs -0 sha256sum > "$evidence/site-sha256.txt"
          fi
          git diff --exit-code
          git diff --cached --exit-code
          test -z "$(git status --porcelain)"

      - name: Upload retained coherence evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: alistaire-capability-lifecycle-coherence-${{ env.EXPECTED_HEAD }}
          path: ${{ runner.temp }}/capability-lifecycle-coherence-evidence
          if-no-files-found: error
          retention-days: 30

      - name: Fail closed on unsuccessful validation
        if: always()
        shell: bash
        env:
          COHERENCE_STATUS: ${{ steps.coherence.outputs.status }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
          DOCS_STATUS: ${{ steps.docs.outputs.status }}
          BUILD_STATUS: ${{ steps.build.outputs.status }}
        run: |
          set -euo pipefail
          test "$COHERENCE_STATUS" = "0"
          test "$TEST_STATUS" = "0"
          test "$DOCS_STATUS" = "0"
          test "$BUILD_STATUS" = "0"
