name: D2A Common Contract Graph Readiness

on:
  pull_request:
    paths:
      - "docs/d2a-common-contract-ownership-graph.md"
      - "docs/d2a-common-contract-ownership-graph-v1.json"
      - "scripts/check_d2a_common_contract_graph.py"
      - "tests/test_check_d2a_common_contract_graph.py"
      - "mkdocs.yml"
      - ".github/workflows/d2a-common-contract-graph-readiness.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: d2a-common-contract-graph-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-d2a-graph:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUBMITTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.SUBMITTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: ""

      - name: Assert exact clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SUBMITTED_SHA"
          test -z "$(git status --porcelain)"
          required=(
            docs/d2a-common-contract-ownership-graph.md
            docs/d2a-common-contract-ownership-graph-v1.json
            scripts/check_d2a_common_contract_graph.py
            tests/test_check_d2a_common_contract_graph.py
          )
          for path in "${required[@]}"; do test -f "$path"; done
          evidence="$RUNNER_TEMP/d2a-common-contract-graph-evidence"
          mkdir -p "$evidence"
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$SUBMITTED_SHA"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
          } | tee "$evidence/source-identity.txt"

      - name: Validate D2A graph
        id: validator
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/d2a-common-contract-graph-evidence"
          python3 scripts/check_d2a_common_contract_graph.py --submitted-sha "$SUBMITTED_SHA" \
            > "$evidence/d2a-common-contract-graph-report.json" \
            2> "$evidence/d2a-common-contract-graph-errors.txt"
          status=$?
          cat "$evidence/d2a-common-contract-graph-report.json" || true
          cat "$evidence/d2a-common-contract-graph-errors.txt" >&2 || true
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run hostile regressions
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/d2a-common-contract-graph-evidence"
          python3 -m unittest tests.test_check_d2a_common_contract_graph -v \
            > "$evidence/d2a-common-contract-graph-tests.txt" 2>&1
          status=$?
          cat "$evidence/d2a-common-contract-graph-tests.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record deterministic inputs
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/d2a-common-contract-graph-evidence"
          sha256sum \
            docs/d2a-common-contract-ownership-graph.md \
            docs/d2a-common-contract-ownership-graph-v1.json \
            scripts/check_d2a_common_contract_graph.py \
            tests/test_check_d2a_common_contract_graph.py \
            mkdocs.yml \
            .github/workflows/d2a-common-contract-graph-readiness.yml \
            > "$evidence/input-sha256.txt"
          git diff --exit-code
          git diff --cached --exit-code
          test -z "$(git status --porcelain)"

      - name: Upload retained evidence
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: d2a-common-contract-graph-${{ env.SUBMITTED_SHA }}
          path: ${{ runner.temp }}/d2a-common-contract-graph-evidence
          if-no-files-found: error
          retention-days: 30

      - name: Fail closed on unsuccessful validation
        shell: bash
        env:
          VALIDATOR_STATUS: ${{ steps.validator.outputs.status }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
        run: |
          set -euo pipefail
          test "$VALIDATOR_STATUS" = "0"
          test "$TEST_STATUS" = "0"
